# ═══════════════════════════════════════════════════════════════════════════
# Ising-to-QCD Mapping Parameters
# Reference: Parotto et al., Phys. Rev. C 101, 034901 (2020)
# ═══════════════════════════════════════════════════════════════════════════

critical_point:
  Tc:    143.2   # MeV – critical temperature
  muBc:  350.0   # MeV – critical baryon chemical potential

mapping:
  alpha1:  3.85    # degrees – angle of h-axis
  alpha2:  93.85   # degrees – angle of r-axis
  rho:     2.0     # non-universal scale
  w:       1.0     # non-universal width

ising_exponents:
  beta:   0.326
  delta:  4.80
  nu:     0.630
  eta:    0.036
  gamma:  1.237

schofield:
  c2:   -0.762
  c4:    0.008

correlation_length:
  xi0:     1.0    # fm
  xi_max:  3.0    # fm – non-equilibrium cap

cumulant_scaling:
  kappa2_exp:  1.964   # 2 - eta
  kappa3_exp:  2.187   # beta*delta + gamma/2
  kappa4_exp:  4.373   # 2*beta*delta + gamma

embedding:
  strength:  0.2

# ── BES run configuration ────────────────────────────────────────────────
# Paths updated to reflect SMASH output locations
bes_runs:
  signal:
    energy_gev:   7.7
    label:        1
    muB_mean_mev: 421
    T_mean_mev:   131
    cells:        264745
    freezeout:    data/signal_freezeout_7gev.dat
    sampler_out:  sampler_output/signal_7gev/particle_lists.oscar
    smash_out:    data/smash_output/signal_7gev/particle_lists.oscar
    jet_csv:      analysis/jets_signal_7gev_smash.csv

  control:
    energy_gev:   11.5
    label:        1
    muB_mean_mev: 316
    T_mean_mev:   146
    cells:        362521
    freezeout:    data/control_11gev.dat
    sampler_out:  sampler_output/control_11gev/particle_lists.oscar
    smash_out:    data/smash_output/control_11gev/particle_lists.oscar
    jet_csv:      analysis/jets_control_11gev_smash.csv

  baseline:
    energy_gev:   19.6
    label:        0
    muB_mean_mev: 215
    T_mean_mev:   153
    cells:        670229
    freezeout:    data/baseline_19gev.dat
    sampler_out:  sampler_output/baseline_19gev/particle_lists.oscar
    smash_out:    data/smash_output/baseline_19gev/particle_lists.oscar
    jet_csv:      analysis/jets_baseline_19gev_smash.csv

# ── Jet clustering ───────────────────────────────────────────────────────
clustering:
  algorithm:   anti-kt
  R:           0.4
  pt_min_jet:  5.0      # GeV
  pt_min_const: 0.15    # GeV
  charged_only: true    # pi+, K+, p filter applied
  src:         analysis/cluster_heavyion_jets.cc

# ── ML features ──────────────────────────────────────────────────────────
ml_features:
  - jet_pt
  - jet_eta
  - jet_phi
  - jet_mass
  - nconstituents
  - pt_d
  - sqrt_d12

# ── Training results (23 June 2026) ─────────────────────────────────────
ml_results:
  date:             2026-06-23
  train_on:         jets_signal_7gev_smash vs jets_baseline_19gev_smash
  total_jets:       8055
  signal_jets:      814
  baseline_jets:    7241
  best_auc:         0.8692
  classifier:       HeavyIonClassifier (PyTorch, 64->32->16->1)
  model_file:       analysis/heavyion_classifier.pth
  control_11gev_mean_score: 0.978
  # NOTE: 11.5 GeV scores higher than 7.7 GeV, indicating the
  # classifier learned collision-energy differences rather than
  # CP-specific features. Same-energy control needed.

# ── Afterburner impact (sampler vs SMASH) ────────────────────────────────
afterburner_impact:
  jet_mass_shift_pct:   -46.2    # resonance decays + charged filter
  sqrt_d12_shift_pct:   -12.8    # softening from rescattering
  pt_d_shift_pct:        -0.16   # nearly unchanged

# ── Sampler (SMASH-hadron-sampler v3.0) ──────────────────────────────────
sampler:
  ecrit:            0.5
  number_of_events: 1000
  shear:            1
  bulk:             0

# ── vHLLE hydro parameters ───────────────────────────────────────────────
vhlle:
  eos:        Laine_nf3.dat
  ic_model:   3       # UrQMD averaged IC
  e_crit:     0.5
  energies:
    7.7_gev:
      tau0:    3.2
      etaS:    0.20
      etamax:  2.5
    11.5_gev:
      tau0:    2.1
      etaS:    0.20
      etamax:  2.5
    19.6_gev:
      tau0:    1.22
      etaS:    0.15
      etamax:  2.5
